name: Jupyter Book Deploy (GitHub Pages)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-deploy:
    name: Build and deploy pages from main
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install ./pymrm
        pip install -r requirements.txt
        pip install "jupyter-book==0.15.1" "sphinx==5.0.2" "sphinx-autodoc-typehints<1.19"

    - name: Regenerate API autosummary index
      run: python3 scripts/generate_function_list.py

    - name: Build Jupyter Book
      run: jupyter-book build .

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./_build/html
