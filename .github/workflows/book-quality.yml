name: Jupyter Book CI Checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: book-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  book-quality:
    name: Validate book build and content quality
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js (required by mystmd)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ./pymrm
          pip install -r requirements.txt
          pip install codespell

      - name: Install language checker
        run: npm install --global alex

      - name: Generate API documentation (MyST Markdown)
        run: python scripts/generate_api_docs.py

      - name: Build Jupyter Book (HTML)
        run: jupyter-book build --html

      - name: Spelling check (codespell)
        run: |
          codespell README.md content myst.yml \
            --skip="*.png,*.svg,*.ipynb,*.tex,*.bib,*.css,*.js"

      - name: Language check (alex)
        continue-on-error: true
        run: |
          mapfile -t markdown_files < <(find content -type f -name "*.md" | sort)
          alex README.md "${markdown_files[@]}"
