name: Jupyter Book CI Checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: book-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  book-quality:
    name: Validate book build and content quality
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: python:3.12

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git curl nodejs npm
          rm -rf /var/lib/apt/lists/*

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ./pymrm
          pip install -r requirements.txt
          pip install codespell

      - name: Install language checker
        run: npm install --global alex

      - name: Regenerate API autosummary index
        run: python3 scripts/generate_function_list.py

      - name: Build Jupyter Book (HTML)
        run: |
          jupyter-book clean .
          jupyter-book build .

      - name: Check links
        run: sphinx-build -b linkcheck . _build/linkcheck

      - name: Spelling check (codespell)
        run: |
          codespell README.md content _config.yml _toc.yml \
            --skip="*.png,*.svg,*.ipynb,*.tex,*.bib,*.css,*.js"

      - name: Language check (alex)
        continue-on-error: true
        run: |
          mapfile -t markdown_files < <(find content -type f -name "*.md" | sort)
          alex README.md "${markdown_files[@]}"
