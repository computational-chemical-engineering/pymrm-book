name: Check book against latest pymrm

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pymrm-submodule-consistency-${{ github.ref }}
  cancel-in-progress: true

jobs:
  consistency-check:
    name: Validate docs with latest pymrm submodule
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update pymrm submodule to latest main
        run: |
          git submodule update --init --remote --recursive pymrm
          git submodule status pymrm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js (required by mystmd)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ./pymrm
          pip install -r requirements.txt

      - name: Regenerate API documentation (MyST Markdown)
        run: python scripts/generate_api_docs.py

      - name: Check generated API files are up to date
        run: |
          git diff --exit-code -- content/api/generated || (
            echo "Error: API docs are out of sync with the latest pymrm."
            echo "Run scripts/generate_api_docs.py and commit the updated content/api/generated files."
            exit 1
          )

      - name: Build Jupyter Book
        run: jupyter-book build --html
